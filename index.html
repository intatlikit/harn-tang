<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>หารตัง 💸</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161a22;
    --surface2: #1e2330;
    --surface3: #252c3a;
    --border: #2d3548;
    --border2: #3d4a60;
    --accent: #4ade80;
    --accent2: #22d3ee;
    --accent3: #f59e0b;
    --danger: #f87171;
    --text: #e8edf5;
    --text2: #a0aec0;
    --text3: #64748b;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Kanit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(74,222,128,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(34,211,238,0.04) 0%, transparent 50%);
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }

  /* HEADER */
  .header {
    text-align: center;
    padding: 32px 0 28px;
  }
  .header-icon {
    font-size: 40px;
    display: block;
    margin-bottom: 8px;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .header h1 {
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header p {
    color: var(--text3);
    font-size: 0.9rem;
    margin-top: 4px;
    font-weight: 300;
  }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .card-title {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title span { color: var(--accent); }

  /* INPUT ROW */
  .input-row {
    display: flex;
    gap: 8px;
  }
  .input-field {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    color: var(--text);
    font-family: 'Kanit', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-field::placeholder { color: var(--text3); }
  .input-field:focus {
    border-color: var(--accent2);
    box-shadow: 0 0 0 3px rgba(34,211,238,0.1);
  }

  /* BUTTONS */
  .btn {
    padding: 11px 18px;
    border-radius: 10px;
    border: none;
    font-family: 'Kanit', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #22c55e);
    color: #0a1a0e;
  }
  .btn-primary:hover { filter: brightness(1.1); box-shadow: 0 0 16px rgba(74,222,128,0.3); }
  .btn-primary:disabled {
    background: var(--surface3);
    color: var(--text3);
    cursor: not-allowed;
    filter: none;
    box-shadow: none;
  }
  .btn-danger {
    background: rgba(248,113,113,0.12);
    color: var(--danger);
    border: 1px solid rgba(248,113,113,0.2);
    padding: 6px 10px;
    font-size: 0.82rem;
  }
  .btn-danger:hover { background: rgba(248,113,113,0.22); }
  .btn-ghost {
    background: var(--surface2);
    color: var(--text2);
    border: 1px solid var(--border);
    padding: 6px 12px;
    font-size: 0.82rem;
  }
  .btn-ghost:hover { background: var(--surface3); color: var(--text); }
  .btn-accent2 {
    background: linear-gradient(135deg, var(--accent2), #0891b2);
    color: #0a1a1e;
    padding: 13px 22px;
    font-size: 1rem;
  }
  .btn-accent2:hover { filter: brightness(1.1); box-shadow: 0 0 16px rgba(34,211,238,0.3); }
  .btn-amber {
    background: linear-gradient(135deg, var(--accent3), #d97706);
    color: #1a1000;
    padding: 13px 22px;
    font-size: 1rem;
  }
  .btn-amber:hover { filter: brightness(1.1); box-shadow: 0 0 16px rgba(245,158,11,0.3); }

  /* FRIEND TAGS */
  .tags-container {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }
  .tag {
    background: var(--surface3);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 5px 12px 5px 14px;
    font-size: 0.88rem;
    display: flex;
    align-items: center;
    gap: 8px;
    animation: tagIn 0.25s ease;
  }
  @keyframes tagIn {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }
  .tag-remove {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    padding: 0;
    transition: color 0.2s;
  }
  .tag-remove:hover { color: var(--danger); }

  /* ITEMS */
  .item-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-top: 10px;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .item-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .item-name {
    font-weight: 600;
    font-size: 1rem;
    color: var(--text);
  }
  .item-price {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.05rem;
    color: var(--accent);
    font-weight: 600;
  }
  .item-actions {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
  }
  .person-toggles {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .person-toggle {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: var(--surface3);
    color: var(--text2);
    font-family: 'Kanit', sans-serif;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .person-toggle.selected {
    background: rgba(74,222,128,0.15);
    border-color: var(--accent);
    color: var(--accent);
  }
  .person-toggle:hover:not(.selected) { border-color: var(--border2); background: var(--surface); }
  .no-friends { color: var(--text3); font-size: 0.85rem; font-style: italic; }

  /* SUMMARY */
  .summary-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 4px;
  }
  .summary-table th {
    text-align: left;
    font-size: 0.75rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text3);
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
  }
  .summary-table td {
    padding: 10px 10px;
    border-bottom: 1px solid var(--border);
  }
  .summary-table tr:last-child td { border-bottom: none; }
  .summary-row { cursor: pointer; transition: background 0.15s; }
  .summary-row:hover td { background: var(--surface3); }
  .person-name-cell {
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .expand-icon { color: var(--text3); font-size: 0.7rem; transition: transform 0.2s; }
  .expand-icon.open { transform: rotate(90deg); }
  .amount-cell {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 1.05rem;
    color: var(--accent);
    text-align: right;
  }
  .breakdown-row td {
    padding: 0;
    border-bottom: none;
  }
  .breakdown-content {
    background: var(--bg);
    border-radius: 8px;
    margin: 0 6px 8px;
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.3s ease;
  }
  .breakdown-content.open { max-height: 400px; }
  .breakdown-inner { padding: 10px 14px; }
  .breakdown-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 0;
    font-size: 0.85rem;
    color: var(--text2);
    border-bottom: 1px solid var(--border);
  }
  .breakdown-item:last-child { border-bottom: none; }
  .breakdown-item-price {
    font-family: 'IBM Plex Mono', monospace;
    color: var(--accent2);
  }

  .total-row td {
    padding-top: 12px;
    border-top: 2px solid var(--border2);
    border-bottom: none;
  }

  /* ACTION BUTTONS */
  .action-row {
    display: flex;
    gap: 12px;
    margin-top: 4px;
  }
  .action-row .btn { flex: 1; justify-content: center; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 30px;
    color: var(--text3);
    font-size: 0.9rem;
  }
  .empty-state span { display: block; font-size: 2rem; margin-bottom: 8px; }

  /* DIVIDER */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 20px 0;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface3);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 0.9rem;
    transition: transform 0.3s ease;
    z-index: 999;
    white-space: nowrap;
    box-shadow: var(--shadow);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* PREVIEW OVERLAY (FOR IN-APP BROWSER FALLBACK) */
  .preview-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    z-index: 2000;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .preview-card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 16px;
    padding: 20px;
    max-width: 440px;
    width: 100%;
    box-shadow: var(--shadow);
    text-align: center;
  }
  .preview-img {
    width: 100%;
    max-height: 60vh;
    object-fit: contain;
    border-radius: 8px;
    margin-top: 12px;
    border: 1px solid var(--border);
  }

  /* CANVAS SLIP */
  #slipCanvas { display: none; }

  @media (max-width: 480px) {
    .header h1 { font-size: 1.7rem; }
    .btn-accent2, .btn-amber { padding: 12px 16px; font-size: 0.9rem; }
    .action-row { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- HEADER -->
  <div class="header">
    <span class="header-icon">💸</span>
    <h1>หารตัง</h1>
    <p>แชร์ค่าใช้จ่ายกับเพื่อนๆ ง่ายๆ</p>
  </div>

  <!-- FRIENDS -->
  <div class="card">
    <div class="card-title"><span>👥</span> รายชื่อเพื่อน</div>
    <div class="input-row">
      <input id="friendInput" class="input-field" type="text" placeholder="กรอกชื่อเพื่อน" maxlength="20" autocomplete="off">
      <button class="btn btn-primary" id="addFriendBtn" onclick="AppState.addFriend()" disabled>+ เพิ่ม</button>
    </div>
    <div class="tags-container" id="friendTags"></div>
  </div>

  <!-- ITEMS -->
  <div class="card">
    <div class="card-title"><span>🧾</span> รายการ</div>
    <div class="input-row">
      <input id="itemInput" class="input-field" type="text" placeholder="กรอกรายการและราคา เช่น ส้มตำ40 หรือ ส้มตำ 40" autocomplete="off" maxlength="60">
      <button class="btn btn-primary" id="addItemBtn" onclick="AppState.addItem()">+ เพิ่ม</button>
    </div>
    <div id="itemsList"></div>
  </div>

  <!-- SUMMARY -->
  <div class="card" id="summaryCard" style="display:none">
    <div class="card-title"><span>📊</span> สรุปยอด</div>
    <table class="summary-table" id="summaryTable"></table>
    <div class="divider"></div>

    <!-- PAYMENT INFO -->
    <div class="card-title" style="margin-bottom:12px"><span>🏦</span> ข้อมูลรับโอน <span style="color:var(--accent3);font-size:0.7rem;font-weight:400;text-transform:none;letter-spacing:0">* กรอกให้ครบเพื่อแชร์</span></div>
    <div class="input-row" style="margin-bottom:10px">
      <select id="bankType" class="input-field" onchange="UI.onBankTypeChange()">
        <option value="">— เลือกช่องทาง —</option>
        <option value="promptpay">📲 พร้อมเพย์</option>
        <option value="bank">🏦 ธนาคาร</option>
      </select>
    </div>
    <div id="bankFields" style="display:none;flex-direction:column;gap:10px">
      <div id="bankNameRow" class="input-row" style="display:none">
        <select id="bankName" class="input-field" onchange="UI.onBankNameChange()">
          <option value="">— เลือกธนาคาร —</option>
          <option>กสิกรไทย (KBANK)</option>
          <option>กรุงไทย (KTB)</option>
          <option>ไทยพาณิชย์ (SCB)</option>
          <option>กรุงเทพ (BBL)</option>
          <option>กรุงศรี (BAY)</option>
          <option>ทหารไทยธนชาต (TTB)</option>
          <option>ออมสิน (GSB)</option>
          <option>ธ.ก.ส. (BAAC)</option>
          <option>ซีไอเอ็มบี (CIMB)</option>
          <option>ยูโอบี (UOB)</option>
          <option>แลนด์แอนด์เฮ้าส์ (LHB)</option>
          <option value="other">อื่นๆ</option>
        </select>
      </div>
      <div id="bankOtherRow" class="input-row" style="display:none">
        <input id="bankOtherName" class="input-field" type="text" placeholder="ระบุชื่อธนาคาร" maxlength="40" autocomplete="off">
      </div>
      <div class="input-row">
        <input id="accountNumber" class="input-field" type="text" placeholder="หมายเลขบัญชี / เบอร์พร้อมเพย์" maxlength="14" autocomplete="off" inputmode="numeric">
      </div>
      <div id="accountNameRow" class="input-row" style="display:none">
        <input id="accountName" class="input-field" type="text" placeholder="ชื่อบัญชี" maxlength="50" autocomplete="off">
      </div>
      <div id="promptpayNameRow" class="input-row" style="display:none">
        <input id="promptpayName" class="input-field" type="text" placeholder="ชื่อเจ้าของพร้อมเพย์" maxlength="50" autocomplete="off">
      </div>
    </div>

    <div class="divider"></div>
    <div class="action-row">
      <button class="btn btn-accent2" id="shareBtn" onclick="Actions.shareText()">📤 แชร์ข้อความ</button>
      <button class="btn btn-amber" id="saveBtn" onclick="Actions.saveImage()">🖼 บันทึกสลิป</button>
    </div>
  </div>

</div>

<!-- DIALOG -->
<div id="dialogOverlay" style="
  display:none;position:fixed;inset:0;z-index:1000;
  background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);
  align-items:center;justify-content:center;padding:20px;
">
  <div style="
    background:#1e2330;border:1px solid #3d4a60;border-radius:20px;
    padding:28px 24px;max-width:360px;width:100%;
    box-shadow:0 20px 60px rgba(0,0,0,0.6);
    animation:dialogIn 0.25s ease;
  ">
    <div id="dialogIcon" style="font-size:2.4rem;text-align:center;margin-bottom:12px">⚠️</div>
    <div id="dialogTitle" style="font-size:1.1rem;font-weight:700;text-align:center;margin-bottom:8px;color:#e8edf5"></div>
    <ul id="dialogList" style="list-style:none;padding:0;margin:0 0 20px;display:flex;flex-direction:column;gap:6px"></ul>
    <button onclick="UI.closeDialog()" style="
      width:100%;padding:13px;border-radius:12px;border:none;
      background:linear-gradient(135deg,#4ade80,#22c55e);
      color:#0a1a0e;font-family:Kanit,sans-serif;font-size:1rem;font-weight:700;cursor:pointer;
    ">รับทราบ</button>
  </div>
</div>

<!-- FALLBACK IMAGE PREVIEW DIALOG FOR IN-APP BROWSER -->
<div class="preview-overlay" id="previewOverlay">
  <div class="preview-card">
    <div style="font-size:1.1rem;font-weight:600;color:var(--accent);margin-bottom:4px">✨ สลิปของคุณพร้อมแล้ว</div>
    <p style="font-size:0.82rem;color:var(--text2);line-height:1.4">ระบบตรวจพบว่าคุณเปิดในหน้าแอปพลิเคชัน<br><strong style="color:var(--accent3)">กรุณากดค้างที่รูปภาพด้านล่าง</strong> แล้วเลือก <strong style="color:var(--accent2)">"บันทึกรูปภาพ"</strong> หรือแชร์ได้เลยครับ</p>
    <img id="previewImg" class="preview-img" alt="Bill Summary">
    <button class="btn btn-ghost" onclick="UI.closePreview()" style="width:100%;margin-top:16px;justify-content:center;padding:12px">ปิดหน้าต่างนี้</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<canvas id="slipCanvas"></canvas>

<script>
// ─── STATE MANAGEMENT ───
const AppState = {
  friends: [],
  items: [],
  openBreakdowns: new Set(),

  calcSummary() {
    const totals = {};
    const breakdown = {};
    this.friends.forEach(f => { totals[f] = 0; breakdown[f] = []; });
    
    this.items.forEach(item => {
      if (item.people.length === 0) return;
      const share = item.price / item.people.length;
      item.people.forEach(p => {
        if (totals[p] !== undefined) {
          totals[p] += share;
          breakdown[p].push({ name: item.name, price: item.price, share, total: item.people.length });
        }
      });
    });

    const grandTotal = Object.values(totals).reduce((sum, val) => sum + val, 0);
    return { totals, breakdown, grandTotal };
  },

  addFriend() {
    const el = document.getElementById('friendInput');
    const name = el.value.trim();
    if (!name) return;
    if (this.friends.includes(name)) { UI.showToast('⚠️ มีชื่อนี้แล้ว'); return; }
    this.friends.push(name);
    el.value = '';
    document.getElementById('addFriendBtn').disabled = true;
    UI.renderAll();
  },

  removeFriend(name) {
    this.friends = this.friends.filter(f => f !== name);
    this.items.forEach(item => { item.people = item.people.filter(p => p !== name); });
    UI.renderAll();
  },

  addItem() {
    const el = document.getElementById('itemInput');
    const val = el.value.trim();
    
    if (!val) { UI.showToast('⚠️ กรุณากรอก ชื่อรายการ และ ราคา ก่อนกดเพิ่มครับ'); return; }

    const match = val.match(/^(.*?)\s*(\d*\.?\d+)$/);
    if (!match) {
      UI.showToast('⚠️ ลืมใส่ราคาหรือเปล่า? ตัวอย่าง: ส้มตำ40 หรือ ส้มตำ 40');
      return;
    }

    const name = match[1].trim();
    const price = parseFloat(match[2]);

    if (!name || isNaN(price) || price <= 0) {
      UI.showToast('⚠️ รูปแบบไม่ถูกต้อง กรุณาใส่ชื่อรายการตามด้วยราคา เช่น เบียร์ 500');
      return;
    }
    
    this.items.push({ id: Date.now(), name, price, people: [] });
    el.value = '';
    UI.renderAll();
  },

  removeItem(id) {
    this.items = this.items.filter(i => i.id !== id);
    UI.renderAll();
  },

  togglePerson(itemId, person) {
    const item = this.items.find(i => i.id === itemId);
    if (!item) return;
    if (item.people.includes(person)) item.people = item.people.filter(p => p !== person);
    else item.people.push(person);
    UI.renderAll();
  },

  setAllPeopleForRequirement(itemId, isSelectAll) {
    const item = this.items.find(i => i.id === itemId);
    if (!item) return;
    item.people = isSelectAll ? [...this.friends] : [];
    UI.renderAll();
  },
  selectAll(itemId) { this.setAllPeopleForRequirement(itemId, true); },
  deselectAll(itemId) { this.setAllPeopleForRequirement(itemId, false); }
};

// ─── UI RENDERER & INTERACTION ───
const UI = {
  escHtml: (str) => str ? str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;") : '',

  formatCurrencyText(num) {
    const formatted = num.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
    return `${formatted} บาท`;
  },

  showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  },

  showDialog(errors) {
    const overlay = document.getElementById('dialogOverlay');
    document.getElementById('dialogTitle').textContent = 'กรุณากรอกข้อมูลให้ครบก่อนนะ';
    document.getElementById('dialogList').innerHTML = errors.map(e => `
      <li style="display:flex;align-items:flex-start;gap:10px;background:#252c3a;border-radius:10px;padding:10px 12px;font-size:0.88rem;color:#a0aec0">
        <span style="font-size:1rem;flex-shrink:0">${e.icon}</span>
        <span>${e.text}</span>
      </li>
    `).join('');
    overlay.style.display = 'flex';
  },

  closeDialog: () => document.getElementById('dialogOverlay').style.display = 'none',
  isInAppBrowser: () => /FBAN|FBAV|Line|GSA/i.test(navigator.userAgent || navigator.vendor || window.opera),
  showPreview: (dataUrl) => { document.getElementById('previewImg').src = dataUrl; document.getElementById('previewOverlay').style.display = 'flex'; },
  closePreview: () => document.getElementById('previewOverlay').style.display = 'none',

  onBankTypeChange() {
    const type = document.getElementById('bankType').value;
    document.getElementById('bankFields').style.display = type ? 'flex' : 'none';
    if (!type) return;

    const isPP = type === 'promptpay';
    document.getElementById('bankNameRow').style.display = isPP ? 'none' : 'flex';
    document.getElementById('accountNameRow').style.display = isPP ? 'none' : 'flex';
    document.getElementById('promptpayNameRow').style.display = isPP ? 'flex' : 'none';
    document.getElementById('bankOtherRow').style.display = 'none';
    document.getElementById('accountNumber').placeholder = isPP ? 'เบอร์โทร / เลขบัตรพร้อมเพย์' : 'หมายเลขบัญชี (ไม่เกิน 14 หลัก)';
    if (!isPP) this.onBankNameChange();
  },

  onBankNameChange() {
    const val = document.getElementById('bankName').value;
    document.getElementById('bankOtherRow').style.display = (val === 'other') ? 'flex' : 'none';
  },

  renderAll() {
    this.renderFriends();
    this.renderItems();
    this.renderSummary();
  },

  renderFriends() {
    document.getElementById('friendTags').innerHTML = AppState.friends.map(f => `
      <div class="tag">
        <span>${this.escHtml(f)}</span>
        <button class="tag-remove" onclick="AppState.removeFriend('${f}')">×</button>
      </div>
    `).join('');
  },

  renderItems() {
    const container = document.getElementById('itemsList');
    if (AppState.items.length === 0) {
      container.innerHTML = '<div class="empty-state"><span>🧾</span>ยังไม่มีรายการ</div>';
      return;
    }
    container.innerHTML = AppState.items.map(item => `
      <div class="item-card">
        <div class="item-header">
          <div class="item-name">${this.escHtml(item.name)}</div>
          <div style="display:flex;align-items:center;gap:10px">
            <span class="item-price">฿${item.price.toLocaleString()}</span>
            <button class="btn btn-danger" onclick="AppState.removeItem(${item.id})">🗑</button>
          </div>
        </div>
        <div class="item-actions">
          <button class="btn btn-ghost" onclick="AppState.selectAll(${item.id})">✅ เลือกทุกคน</button>
          <button class="btn btn-ghost" onclick="AppState.deselectAll(${item.id})">⬜ ยกเลิกทุกคน</button>
        </div>
        ${AppState.friends.length === 0
          ? '<p class="no-friends">เพิ่มเพื่อนก่อนเลยนะ 👆</p>'
          : `<div class="person-toggles">
              ${AppState.friends.map(f => `
                <button class="person-toggle ${item.people.includes(f) ? 'selected' : ''}"
                  onclick="AppState.togglePerson(${item.id}, '${f}')">
                  ${item.people.includes(f) ? '✓ ' : ''}${this.escHtml(f)}
                </button>
              `).join('')}
            </div>`
        }
      </div>
    `).join('');
  },

  renderSummary() {
    const card = document.getElementById('summaryCard');
    if (AppState.friends.length === 0 && AppState.items.length === 0) { card.style.display = 'none'; return; }
    card.style.display = 'block';

    const { totals, breakdown, grandTotal } = AppState.calcSummary();
    
    let html = `<thead><tr><th>ชื่อ</th><th style="text-align:right">ยอดรวม</th></tr></thead><tbody>`;
    AppState.friends.forEach(f => {
      const isOpen = AppState.openBreakdowns.has(f);
      html += `
        <tr class="summary-row" onclick="UI.toggleBreakdown('${f}')">
          <td><div class="person-name-cell">
            <span class="expand-icon ${isOpen ? 'open' : ''}">▶</span>${this.escHtml(f)}
          </div></td>
          <td class="amount-cell">฿${totals[f].toFixed(2)}</td>
        </tr>
        <tr class="breakdown-row">
          <td colspan="2">
            <div class="breakdown-content ${isOpen ? 'open' : ''}">
              <div class="breakdown-inner">
                ${breakdown[f].length === 0
                  ? '<p style="color:var(--text3);font-size:0.85rem">ยังไม่มีรายการ</p>'
                  : breakdown[f].map(b => `
                    <div class="breakdown-item">
                      <span>${this.escHtml(b.name)} <span style="color:var(--text3);font-size:0.78rem">(÷${b.total}คน)</span></span>
                      <span class="breakdown-item-price">฿${b.share.toFixed(2)}</span>
                    </div>
                  `).join('')
                }
              </div>
            </div>
          </td>
        </tr>`;
    });

    html += `<tr class="total-row">
      <td style="font-weight:700;color:var(--text)">รวมทั้งหมด</td>
      <td style="font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:1.1rem;color:var(--accent3);text-align:right">฿${grandTotal.toFixed(2)}</td>
    </tr></tbody>`;
    document.getElementById('summaryTable').innerHTML = html;
  },

  toggleBreakdown(name) {
    if (AppState.openBreakdowns.has(name)) AppState.openBreakdowns.delete(name);
    else AppState.openBreakdowns.add(name);
    this.renderSummary();
  }
};

// ─── ACTIONS (SHARE & SAVE IMAGE) ───
const Actions = {
  getValidationAndPayment() {
    const errors = [];
    const { totals, breakdown, grandTotal } = AppState.calcSummary();

    if (AppState.friends.length === 0) {
      errors.push({ icon: '👥', text: 'ยังไม่มีเพื่อนในระบบ' });
    } else if (grandTotal === 0) {
      errors.push({ icon: '🧾', text: 'ยอดรวมเป็น 0 — กรุณาเลือกคนหารในแต่ละรายการก่อนนะ' });
    }

    const type = document.getElementById('bankType').value;
    const acctNo = document.getElementById('accountNumber').value.trim();
    let paymentInfo = null;

    if (!type) {
      errors.push({ icon: '🏦', text: 'เลือกช่องทางรับโอน (พร้อมเพย์ หรือ ธนาคาร)' });
    } else {
      if (!acctNo) errors.push({ icon: '🔢', text: type === 'promptpay' ? 'กรอกเบอร์โทร / เลขบัตรพร้อมเพย์' : 'กรอกหมายเลขบัญชีธนาคาร' });
      
      if (type === 'bank') {
        const bName = document.getElementById('bankName').value;
        const oName = document.getElementById('bankOtherName').value.trim();
        const aName = document.getElementById('accountName').value.trim();

        if (!bName) errors.push({ icon: '🏦', text: 'เลือกธนาคาร' });
        else if (bName === 'other' && !oName) errors.push({ icon: '✏️', text: 'ระบุชื่อธนาคารอื่น ๆ' });
        if (!aName) errors.push({ icon: '👤', text: 'กรอกชื่อบัญชี' });

        paymentInfo = { type, label: bName === 'other' ? oName : bName, number: acctNo, name: aName };
      } else if (type === 'promptpay') {
        const pName = document.getElementById('promptpayName').value.trim();
        if (!pName) errors.push({ icon: '👤', text: 'กรอกชื่อเจ้าของพร้อมเพย์' });
        
        paymentInfo = { type, label: 'พร้อมเพย์', number: acctNo, name: pName };
      }
    }

    return { errors, totals, breakdown, grandTotal, paymentInfo };
  },

  shareText() {
    const { errors, totals, paymentInfo } = this.getValidationAndPayment();
    if (errors.length) { UI.showDialog(errors); return; }
    
    let lines = ['💸 สรุปยอดหารตัง', ''];
    AppState.friends.forEach(f => lines.push(`👤 ${f}  →  ${UI.formatCurrencyText(totals[f])}`));
    lines.push('');
    
    if (paymentInfo) {
      lines.push('── ช่องทางรับโอน ──');
      lines.push(paymentInfo.type === 'promptpay' ? `📲 พร้อมเพย์: ${paymentInfo.number}` : `🏦 ${paymentInfo.label}\nเลขบัญชี: ${paymentInfo.number}`);
      if (paymentInfo.name) lines.push(`ชื่อบัญชี: ${paymentInfo.name}`);
    }

    const text = lines.join('\n');
    if (navigator.share) navigator.share({ text }).catch(e => console.log(e));
    else navigator.clipboard.writeText(text).then(() => UI.showToast('📋 คัดลอกข้อความลง Clipboard แล้ว'));
  },

  async saveImage() {
    const { errors, totals, breakdown, grandTotal, paymentInfo } = this.getValidationAndPayment();
    if (errors.length) { UI.showDialog(errors); return; }

    const baseWidth = 480;
    const lineH = 38;
    const padding = 32;
    const headerH = 140;
    
    const personH = AppState.friends.length * (lineH + 2);
    const itemRows = Object.values(breakdown).reduce((s, bd) => s + bd.length, 0);
    const breakH = itemRows * 28 + AppState.friends.length * 22;
    const payH = paymentInfo ? (paymentInfo.name ? 96 : 74) : 0;
    const footerH = 80;
    const baseHeight = headerH + personH + breakH + payH + footerH + (padding * 2) + 40;

    const dpr = Math.max(window.devicePixelRatio || 1, 3); 
    const canvas = document.getElementById('slipCanvas');
    canvas.width = baseWidth * dpr;
    canvas.height = baseHeight * dpr;

    const ctx = canvas.getContext('2d', { alpha: false });
    ctx.scale(dpr, dpr);
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';

    ctx.fillStyle = '#0d1117';
    ctx.fillRect(0, 0, baseWidth, baseHeight);

    const grad = ctx.createLinearGradient(0, 0, baseWidth, 0);
    grad.addColorStop(0, '#1a2e1c'); grad.addColorStop(1, '#0d1a2a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, baseWidth, headerH);
    ctx.fillStyle = '#4ade80';
    ctx.fillRect(0, headerH - 2, baseWidth, 2);

    ctx.textBaseline = 'middle';
    ctx.font = 'bold 32px Kanit, sans-serif';
    ctx.textAlign = 'center'; ctx.fillStyle = '#4ade80';
    ctx.fillText('💸 หารตัง', baseWidth / 2, 48);

    ctx.font = '500 15px Kanit, sans-serif'; ctx.fillStyle = '#64748b';
    ctx.fillText(new Date().toLocaleString('th-TH', { dateStyle: 'medium', timeStyle: 'short' }), baseWidth / 2, 84);

    ctx.font = '600 14px Kanit, sans-serif'; ctx.fillStyle = '#22d3ee';
    ctx.fillText('สรุปยอดค่าใช้จ่ายสำหรับทุกคน', baseWidth / 2, 112);

    let y = headerH + 30;

    ctx.font = 'bold 13px Kanit, sans-serif'; ctx.fillStyle = '#4f5e75';
    ctx.textAlign = 'left'; ctx.fillText('ชื่อ', padding, y);
    ctx.textAlign = 'right'; ctx.fillText('ยอดรวมที่ต้องจ่าย', baseWidth - padding, y);
    y += 18;
    ctx.fillStyle = '#1e2a3a'; ctx.fillRect(padding, y, baseWidth - padding * 2, 1);
    y += 16;

    AppState.friends.forEach((f, i) => {
      ctx.fillStyle = i % 2 === 0 ? '#121822' : '#0d1117';
      ctx.fillRect(padding - 8, y - 20, baseWidth - padding * 2 + 16, lineH);
      
      ctx.font = '600 15px Kanit, sans-serif'; ctx.fillStyle = '#e8edf5';
      ctx.textAlign = 'left'; ctx.fillText(f, padding, y);
      
      ctx.font = '600 16px "IBM Plex Mono", monospace'; ctx.fillStyle = '#4ade80';
      ctx.textAlign = 'right'; ctx.fillText('฿' + totals[f].toFixed(2), baseWidth - padding, y);
      y += lineH + 2;
    });

    y += 10;
    ctx.fillStyle = '#1e2a3a'; ctx.fillRect(padding, y, baseWidth - padding * 2, 1);
    y += 20;

    AppState.friends.forEach(f => {
      const bd = breakdown[f];
      if (bd.length === 0) return;
      ctx.font = '600 14px Kanit, sans-serif'; ctx.fillStyle = '#22d3ee';
      ctx.textAlign = 'left'; ctx.fillText('📌 ' + f, padding, y);
      y += 22;
      
      bd.forEach(b => {
        ctx.font = '400 13px Kanit, sans-serif'; ctx.fillStyle = '#a0aec0';
        ctx.textAlign = 'left'; ctx.fillText(`  • ${b.name} (÷${b.total}คน)`, padding + 8, y);
        
        ctx.font = '500 13px "IBM Plex Mono", monospace'; ctx.fillStyle = '#7dd3fc';
        ctx.textAlign = 'right'; ctx.fillText('฿' + b.share.toFixed(2), baseWidth - padding, y);
        y += 26;
      });
      y += 6;
    });

    y += 10;
    const gradT = ctx.createLinearGradient(0, y - 10, baseWidth, y + 50);
    gradT.addColorStop(0, '#1a2211'); gradT.addColorStop(1, '#0c160c');
    ctx.fillStyle = gradT; ctx.fillRect(0, y - 10, baseWidth, 60);
    ctx.fillStyle = '#f59e0b'; ctx.fillRect(0, y - 10, baseWidth, 2);

    ctx.font = 'bold 15px Kanit, sans-serif'; ctx.fillStyle = '#a0aec0';
    ctx.textAlign = 'left'; ctx.fillText('ยอดรวมสุทธิทั้งสิ้น', padding, y + 20);
    
    ctx.font = 'bold 24px "IBM Plex Mono", monospace'; ctx.fillStyle = '#f59e0b';
    ctx.textAlign = 'right'; ctx.fillText('฿' + grandTotal.toFixed(2), baseWidth - padding, y + 20);
    y += 70;

    if (paymentInfo) {
      ctx.font = 'bold 13px Kanit, sans-serif'; ctx.fillStyle = '#51627a';
      ctx.textAlign = 'left'; ctx.fillText('── ช่องทางการชำระเงินโอน ──', padding, y);
      y += 24;

      ctx.font = '600 15px Kanit, sans-serif'; ctx.fillStyle = '#e8edf5';
      if (paymentInfo.type === 'promptpay') {
        ctx.fillText(`📲 ${paymentInfo.label} : ${paymentInfo.number}`, padding, y);
      } else {
        ctx.fillText(`🏦 ${paymentInfo.label}`, padding, y); y += 22;
        ctx.font = '600 15px "IBM Plex Mono", monospace';
        ctx.fillText(`เลขที่บัญชี: ${paymentInfo.number}`, padding + 28, y);
      }
      if (paymentInfo.name) {
        y += 22; ctx.fillStyle = '#a0aec0'; ctx.font = '400 14px Kanit, sans-serif';
        ctx.fillText(`ชื่อบัญชี: ${paymentInfo.name}`, padding + 28, y);
      }
      y += 30;
    }

    ctx.fillStyle = '#1e2330'; ctx.fillRect(padding, y, baseWidth - padding * 2, 1);
    y += 26;
    ctx.font = '300 13px Kanit, sans-serif'; ctx.fillStyle = '#4f5e75';
    ctx.textAlign = 'center'; ctx.fillText('ขอบคุณที่ใช้บริการสรุปยอดหารตัง 💸', baseWidth / 2, y);

    // ─── [อัปเดตระบบดาวน์โหลดภาพแบบ HYBRID FLOW] ───
    setTimeout(async () => {
      const filename = `BillSummary-${new Date().toISOString().slice(0,10)}.jpg`;

      // 1. ตรวจสอบเงื่อนไขว่าเป็น In-App Browser หรือไม่
      if (UI.isInAppBrowser()) {
        const dataUrl = canvas.toDataURL('image/jpeg', 0.90);
        UI.showPreview(dataUrl);
        return;
      }

      // 2. ถ้าอยู่บน Mobile Browser ทั่วไป ดึงพลังของ Web Share API ในการแชร์ไฟล์ภาพออกมา
      try {
        canvas.toBlob(async (blob) => {
          if (!blob) { UI.showToast('❌ ไม่สามารถสร้างไฟล์ภาพได้'); return; }
          const file = new File([blob], filename, { type: 'image/jpeg' });

          // เช็กว่า Browser บนมือถือ ณ ขณะนั้นรองรับการแชร์ไฟล์ไหม
          if (navigator.canShare && navigator.canShare({ files: [file] })) {
            try {
              await navigator.share({
                files: [file],
                title: 'สรุปยอดหารตัง',
                text: 'สลิปสรุปยอดค่าใช้จ่าย'
              });
              UI.showToast('✨ เปิดหน้าแชร์สำเร็จ');
            } catch (shareErr) {
              // ดักเคสผู้ใช้กดยกเลิกกลางคัน (Abort) หรือแชร์ล้มเหลว ให้ดีดไปเปิด Preview แทน
              if (shareErr.name !== 'AbortError') {
                const fallbackDataUrl = canvas.toDataURL('image/jpeg', 0.90);
                UI.showPreview(fallbackDataUrl);
              }
            }
          } else {
            // ถ้า Browser เก่าหรือไม่รองรับ canShare ไฟล์ (เช่น PC บราวเซอร์รุ่นเก่า) ให้ดาวน์โหลดแบบเดิม
            const dataUrl = canvas.toDataURL('image/jpeg', 0.90);
            const link = document.createElement('a');
            link.download = filename;
            link.href = dataUrl;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            UI.showToast('🖼 บันทึกรูปลงเครื่องเรียบร้อยแล้ว');
          }
        }, 'image/jpeg', 0.90);

      } catch (err) {
        console.error(err);
        // Fallback ขั้นสุดถ้าเกิด Error ขึ้นมาดื้อๆ
        const fallbackDataUrl = canvas.toDataURL('image/jpeg', 0.90);
        UI.showPreview(fallbackDataUrl);
      }
    }, 100);
  }
};

// ─── INITIAL LISTENERS & INPUT VALIDATIONS ───
document.addEventListener('DOMContentLoaded', () => {
  const fInput = document.getElementById('friendInput');
  const fBtn = document.getElementById('addFriendBtn');
  
  fInput.addEventListener('input', () => {
    fInput.value = fInput.value.replace(/[^ก-๙a-zA-Z\s]/g, '');
    fBtn.disabled = fInput.value.trim() === '';
  });
  fInput.addEventListener('keydown', e => { if (e.key === 'Enter') AppState.addFriend(); });

  const iInput = document.getElementById('itemInput');
  iInput.addEventListener('input', function() {
    this.value = this.value.replace(/[^ก-๙a-zA-Z0-9\s\.\-]/g, '');
  });
  iInput.addEventListener('keydown', e => { if (e.key === 'Enter') AppState.addItem(); });

  document.getElementById('accountNumber').addEventListener('input', function() {
    this.value = this.value.replace(/\D/g, '').slice(0, 14);
  });
  
  document.getElementById('dialogOverlay').addEventListener('click', function(e) {
    if (e.target === this) UI.closeDialog();
  });
});
</script>
</body>
</html>
