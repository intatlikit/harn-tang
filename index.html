<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>หารตัง 💸</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
    rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #161a22;
      --surface2: #1e2330;
      --surface3: #252c3a;
      --border: #2d3548;
      --border2: #3d4a60;
      --accent: #4ade80;
      --accent2: #22d3ee;
      --accent3: #f59e0b;
      --danger: #f87171;
      --text: #e8edf5;
      --text2: #a0aec0;
      --text3: #64748b;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Kanit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse at 20% 10%, rgba(74, 222, 128, 0.04) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 90%, rgba(34, 211, 238, 0.04) 0%, transparent 50%);
    }

    #browserWarning {
      display: none;
      background: var(--accent3);
      color: #000;
      text-align: center;
      padding: 8px 12px;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }

    .header {
      text-align: center;
      padding: 32px 0 28px;
    }

    .header-icon {
      font-size: 40px;
      display: block;
      margin-bottom: 8px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-6px);
      }
    }

    .header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      color: var(--text3);
      font-size: 0.9rem;
      margin-top: 4px;
      font-weight: 300;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .card-title {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title span {
      color: var(--accent);
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    .input-field {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      color: var(--text);
      font-family: 'Kanit', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-field::placeholder {
      color: var(--text3);
    }

    .input-field:focus {
      border-color: var(--accent2);
      box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.1);
    }

    .btn {
      padding: 11px 18px;
      border-radius: 10px;
      border: none;
      font-family: 'Kanit', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #22c55e);
      color: #0a1a0e;
    }

    .btn-primary:hover {
      filter: brightness(1.1);
      box-shadow: 0 0 16px rgba(74, 222, 128, 0.3);
    }

    .btn-primary:disabled {
      background: var(--surface3);
      color: var(--text3);
      cursor: not-allowed;
      filter: none;
      box-shadow: none;
    }

    .btn-danger {
      background: rgba(248, 113, 113, 0.12);
      color: var(--danger);
      border: 1px solid rgba(248, 113, 113, 0.2);
      padding: 6px 10px;
      font-size: 0.82rem;
    }

    .btn-ghost {
      background: var(--surface2);
      color: var(--text2);
      border: 1px solid var(--border);
      padding: 6px 12px;
      font-size: 0.82rem;
    }

    .btn-accent2 {
      background: linear-gradient(135deg, var(--accent2), #0891b2);
      color: #0a1a1e;
    }

    .btn-amber {
      background: linear-gradient(135deg, var(--accent3), #d97706);
      color: #1a1000;
    }

    .tags-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .tag {
      background: var(--surface3);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 5px 12px 5px 14px;
      font-size: 0.88rem;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: tagIn 0.25s ease;
    }

    @keyframes tagIn {
      from {
        opacity: 0;
        transform: scale(0.8);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .tag-remove {
      background: none;
      border: none;
      color: var(--text3);
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 0;
    }

    .item-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      margin-top: 10px;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .item-name {
      font-weight: 600;
      font-size: 1rem;
      color: var(--text);
    }

    .item-price {
      font-family: 'Kanit', sans-serif;
      font-size: 1.05rem;
      color: var(--accent);
      font-weight: 600;
    }

    .person-toggles {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .person-toggle {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border2);
      background: var(--surface3);
      color: var(--text2);
      font-family: 'Kanit', sans-serif;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .person-toggle.selected {
      background: rgba(74, 222, 128, 0.15);
      border-color: var(--accent);
      color: var(--accent);
    }

    .summary-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 4px;
    }

    .summary-table th {
      text-align: left;
      font-size: 0.75rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text3);
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
    }

    .summary-table td {
      padding: 10px 10px;
      border-bottom: 1px solid var(--border);
    }

    .summary-row {
      cursor: pointer;
    }

    .summary-row:hover td {
      background: var(--surface3);
    }

    .person-name-cell {
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .expand-icon {
      color: var(--text3);
      font-size: 0.7rem;
      transition: transform 0.2s;
    }

    .expand-icon.open {
      transform: rotate(90deg);
    }

    .amount-cell {
      font-family: 'Kanit', sans-serif;
      font-weight: 600;
      font-size: 1.05rem;
      color: var(--accent);
      text-align: right;
    }

    .breakdown-row td {
      padding: 0;
      border-bottom: none;
    }

    .breakdown-content {
      background: var(--bg);
      border-radius: 8px;
      margin: 0 6px 8px;
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.3s ease;
    }

    .breakdown-content.open {
      max-height: 400px;
    }

    .breakdown-inner {
      padding: 10px 14px;
    }

    .breakdown-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      font-size: 0.85rem;
      color: var(--text2);
      border-bottom: 1px solid var(--border);
    }

    .breakdown-item-price {
      font-family: 'Kanit', sans-serif;
      color: var(--accent2);
    }

    .total-row td {
      padding-top: 12px;
      border-top: 2px solid var(--border2);
      border-bottom: none;
    }

    .action-row {
      display: flex;
      gap: 12px;
      margin-top: 4px;
    }

    .action-row .btn {
      flex: 1;
      justify-content: center;
    }

    .empty-state {
      text-align: center;
      padding: 30px;
      color: var(--text3);
      font-size: 0.9rem;
    }

    .empty-state span {
      display: block;
      font-size: 2rem;
      margin-bottom: 8px;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 20px 0;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface3);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 0.9rem;
      transition: transform 0.3s ease;
      z-index: 999;
      white-space: nowrap;
      box-shadow: var(--shadow);
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* PREVIEW OVERLAY */
    .preview-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
      z-index: 2000;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .preview-card {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 16px;
      padding: 20px;
      max-width: 440px;
      width: 100%;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .preview-img {
      width: 100%;
      max-height: 60vh;
      object-fit: contain;
      border-radius: 12px;
      margin-top: 12px;
      border: 1px solid var(--border);
      background: #0d1117;
    }

    /* CAPTURE UTILITY */
    .capture-hide {
      display: none !important;
    }

    .capture-mode {
      background: #0d1117 !important;
      padding: 24px !important;
      border-radius: 0 !important;
      border: none !important;
      box-shadow: none !important;
    }

    .capture-mode .summary-table th,
    .capture-mode .summary-table td {
      border-color: #2d3548 !important;
    }

    /* Show capture header and expand breakdowns in capture mode */
    #captureHeader {
      display: none;
    }

    .capture-mode #captureHeader {
      display: block !important;
    }

    .capture-mode .breakdown-content {
      max-height: none !important;
      opacity: 1 !important;
      margin-bottom: 12px !important;
    }

    .capture-mode .expand-icon {
      visibility: hidden;
    }

    .capture-mode .summary-row:hover td {
      background: none !important;
    }

    @media (max-width: 480px) {
      .container {
        padding: 16px 12px 60px;
      }

      .header {
        padding: 20px 0 18px;
      }

      .header h1 {
        font-size: 1.6rem;
      }

      .card {
        padding: 16px 14px;
      }

      .btn-accent2,
      .btn-amber {
        padding: 11px 14px;
        font-size: 0.88rem;
      }

      .action-row {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

  <div id="browserWarning">⚠️ ระบบแนะนำให้เปิดด้วย Chrome หรือ Safari เพื่อแชร์รูปภาพได้ลื่นไหลที่สุด</div>

  <div class="container">
    <div class="header">
      <span class="header-icon">💸</span>
      <h1>หารตัง v5</h1>
      <p>แชร์ค่าใช้จ่ายกับเพื่อนๆ ง่ายๆ</p>
    </div>

    <div class="card">
      <div class="card-title"><span>👥</span> รายชื่อเพื่อน</div>
      <div class="input-row">
        <input id="friendInput" class="input-field" type="text" placeholder="กรอกชื่อเพื่อน" maxlength="20">
        <button class="btn btn-primary" id="addFriendBtn" onclick="AppState.addFriend()" disabled>+ เพิ่ม</button>
      </div>
      <div class="tags-container" id="friendTags"></div>
    </div>

    <div class="card">
      <div class="card-title"><span>🧾</span> รายการ</div>
      <div class="input-row">
        <input id="itemInput" class="input-field" type="text" placeholder="กรอกรายการและราคา เช่น ส้มตำ40"
          maxlength="60">
        <button class="btn btn-primary" id="addItemBtn" onclick="AppState.addItem()">+ เพิ่ม</button>
      </div>
      <div id="itemsList"></div>
    </div>

    <div class="card" id="summaryCard" style="display:none">
      <div id="captureArea">
        <!-- Capture Header -->
        <div id="captureHeader"
          style="text-align:center;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:15px">
          <div style="font-size:1.4rem;font-weight:700;color:var(--accent);margin-bottom:4px">💸 สรุปยอดหารตัง</div>
          <div id="captureDate" style="font-size:0.85rem;color:var(--text3)"></div>
        </div>

        <div class="card-title"><span>📊</span> สรุปยอด</div>
        <table class="summary-table" id="summaryTable"></table>

        <div id="paymentDisplay"
          style="display:none;margin-top:16px;padding:14px;background:var(--surface2);border-radius:10px;border:1px solid var(--border)">
          <div style="font-size:0.8rem;color:var(--text3);margin-bottom:4px">ช่องทางรับโอน</div>
          <div id="payDisplayLabel" style="font-weight:600;color:var(--accent2);font-size:0.95rem"></div>
          <div id="payDisplayNumber"
            style="font-family:IBM Plex Mono, monospace;font-size:1.1rem;color:var(--text);margin:2px 0"></div>
          <div id="payDisplayName" style="font-size:0.85rem;color:var(--text2)"></div>
        </div>
      </div>

      <div class="divider"></div>
      <div class="card-title" style="margin-bottom:12px"><span>🏦</span> ข้อมูลรับโอน</div>
      <div class="input-row" style="margin-bottom:10px">
        <select id="bankType" class="input-field" onchange="UI.onBankTypeChange()">
          <option value="">— เลือกช่องทาง —</option>
          <option value="promptpay">📲 พร้อมเพย์</option>
          <option value="bank">🏦 ธนาคาร</option>
        </select>
      </div>
      <div id="bankFields" style="display:none;flex-direction:column;gap:10px">
        <div id="bankNameRow" class="input-row" style="display:none">
          <select id="bankName" class="input-field" onchange="UI.onBankNameChange()">
            <option value="">— เลือกธนาคาร —</option>
            <option>กสิกรไทย (KBANK)</option>
            <option>กรุงไทย (KTB)</option>
            <option>ไทยพาณิชย์ (SCB)</option>
            <option>กรุงเทพ (BBL)</option>
            <option>กรุงศรี (BAY)</option>
            <option>ทหารไทยธนชาต (TTB)</option>
            <option>ออมสิน (GSB)</option>
            <option value="other">อื่นๆ</option>
          </select>
        </div>
        <div id="bankOtherRow" class="input-row" style="display:none"><input id="bankOtherName" class="input-field"
            type="text" placeholder="ระบุชื่อธนาคาร"></div>
        <div class="input-row"><input id="accountNumber" class="input-field" type="text"
            placeholder="เลขบัญชี / พร้อมเพย์" inputmode="numeric"></div>
        <div id="accountNameRow" class="input-row" style="display:none"><input id="accountName" class="input-field"
            type="text" placeholder="ชื่อบัญชี"></div>
        <div id="promptpayNameRow" class="input-row" style="display:none"><input id="promptpayName" class="input-field"
            type="text" placeholder="ชื่อเจ้าของพร้อมเพย์"></div>
      </div>

      <div class="divider"></div>
      <div class="action-row">
        <button class="btn btn-accent2" onclick="Actions.shareText()">📤 แชร์ข้อความ</button>
        <button class="btn btn-amber" id="shareImgBtn" onclick="Actions.shareImage()">🖼 แชร์รูปภาพ</button>
      </div>
    </div>
  </div>

  <div id="dialogOverlay"
    style="display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:20px;">
    <div
      style="background:#1e2330;border:1px solid #3d4a60;border-radius:20px;padding:28px 24px;max-width:360px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.6);">
      <div id="dialogIcon" style="font-size:2.4rem;text-align:center;margin-bottom:12px">⚠️</div>
      <div id="dialogTitle" style="font-size:1.1rem;font-weight:700;text-align:center;margin-bottom:8px;color:#e8edf5">
      </div>
      <ul id="dialogList" style="list-style:none;padding:0;margin:0 0 20px;display:flex;flex-direction:column;gap:6px">
      </ul>
      <button onclick="UI.closeDialog()"
        style="width:100%;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,#4ade80,#22c55e);color:#0a1a0e;font-family:Kanit,sans-serif;font-size:1rem;font-weight:700;cursor:pointer;">รับทราบ</button>
    </div>
  </div>

  <div class="preview-overlay" id="previewOverlay">
    <div class="preview-card">
      <div style="font-size:1.1rem;font-weight:600;color:var(--accent);margin-bottom:6px">✨ สลิปพร้อมแล้ว</div>
      <p id="previewHint" style="font-size:0.82rem;color:var(--text2);line-height:1.6"></p>
      <img id="previewImg" class="preview-img">
      <div style="display:flex;gap:10px;margin-top:14px">
        <button class="btn btn-ghost" onclick="UI.closePreview()" style="flex:1;justify-content:center">ปิด</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const AppState = {
      friends: [], items: [], openBreakdowns: new Set(),
      calcSummary() {
        const totals = {}; const breakdown = {};
        this.friends.forEach(f => { totals[f] = 0; breakdown[f] = []; });
        this.items.forEach(item => {
          if (item.people.length === 0) return;
          const share = item.price / item.people.length;
          item.people.forEach(p => { if (totals[p] !== undefined) { totals[p] += share; breakdown[p].push({ name: item.name, price: item.price, share, total: item.people.length }); } });
        });
        const grandTotal = Object.values(totals).reduce((sum, val) => sum + val, 0);
        return { totals, breakdown, grandTotal };
      },
      addFriend() {
        const el = document.getElementById('friendInput'); const name = el.value.trim();
        if (!name || this.friends.includes(name)) return;
        this.friends.push(name); el.value = ''; document.getElementById('addFriendBtn').disabled = true; UI.renderAll();
      },
      removeFriend(name) {
        this.friends = this.friends.filter(f => f !== name);
        this.items.forEach(item => { item.people = item.people.filter(p => p !== name); });
        UI.renderAll();
      },
      addItem() {
        const el = document.getElementById('itemInput'); const val = el.value.trim();
        const match = val.match(/^(.*?)\s*(\d*\.?\d+)$/);
        if (!match) { UI.showToast('⚠️ ใส่ชื่อรายการและราคา เช่น ส้มตำ40'); return; }
        this.items.push({ id: Date.now(), name: match[1].trim(), price: parseFloat(match[2]), people: [] });
        el.value = ''; UI.renderAll();
      },
      removeItem(id) { this.items = this.items.filter(i => i.id !== id); UI.renderAll(); },
      togglePerson(itemId, person) {
        const item = this.items.find(i => i.id === itemId); if (!item) return;
        if (item.people.includes(person)) item.people = item.people.filter(p => p !== person);
        else item.people.push(person);
        UI.renderAll();
      }
    };

    const UI = {
      escHtml: (str) => str ? str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;") : '',
      formatCurrencyText(num) { return `${num.toLocaleString('th-TH', { minimumFractionDigits: 0, maximumFractionDigits: 2 })} บาท`; },
      showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); },
      showDialog(errors) {
        document.getElementById('dialogTitle').textContent = 'ข้อมูลไม่ครบถ้วน';
        document.getElementById('dialogList').innerHTML = errors.map(e => `<li style="display:flex;gap:10px;background:#252c3a;padding:10px;border-radius:10px;font-size:0.85rem"><span>${e.icon}</span>${e.text}</li>`).join('');
        document.getElementById('dialogOverlay').style.display = 'flex';
      },
      closeDialog: () => document.getElementById('dialogOverlay').style.display = 'none',
      showPreview(dataUrl) {
        document.getElementById('previewImg').src = dataUrl;
        const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        document.getElementById('previewHint').innerHTML = isMobile ? '<strong>กดค้างที่รูปภาพ</strong> แล้วเลือก <strong>"แชร์รูปภาพ"</strong> หรือ <strong>"บันทึกรูปภาพ"</strong>' : 'คลิกขวาเพื่อบันทึกรูปภาพ';
        document.getElementById('previewOverlay').style.display = 'flex';
      },
      closePreview: () => document.getElementById('previewOverlay').style.display = 'none',
      onBankTypeChange() {
        const type = document.getElementById('bankType').value;
        document.getElementById('bankFields').style.display = type ? 'flex' : 'none';
        const isPP = type === 'promptpay';
        document.getElementById('bankNameRow').style.display = isPP ? 'none' : 'flex';
        document.getElementById('accountNameRow').style.display = isPP ? 'none' : 'flex';
        document.getElementById('promptpayNameRow').style.display = isPP ? 'flex' : 'none';
        if (!isPP) this.onBankNameChange();
      },
      onBankNameChange() { document.getElementById('bankOtherRow').style.display = (document.getElementById('bankName').value === 'other') ? 'flex' : 'none'; },
      renderAll() { this.renderFriends(); this.renderItems(); this.renderSummary(); },
      renderFriends() { document.getElementById('friendTags').innerHTML = AppState.friends.map(f => `<div class="tag"><span>${this.escHtml(f)}</span><button class="tag-remove" onclick="AppState.removeFriend('${f}')">×</button></div>`).join(''); },
      renderItems() {
        const container = document.getElementById('itemsList');
        if (AppState.items.length === 0) { container.innerHTML = '<div class="empty-state"><span>🧾</span>ยังไม่มีรายการ</div>'; return; }
        container.innerHTML = AppState.items.map(item => `
      <div class="item-card">
        <div class="item-header">
          <div class="item-name">${this.escHtml(item.name)}</div>
          <div style="display:flex;align-items:center;gap:10px">
            <span class="item-price">${this.formatCurrencyText(item.price)}</span>
            <button class="btn btn-danger" onclick="AppState.removeItem(${item.id})">🗑</button>
          </div>
        </div>
        <div class="person-toggles">
          ${AppState.friends.map(f => `<button class="person-toggle ${item.people.includes(f) ? 'selected' : ''}" onclick="AppState.togglePerson(${item.id}, '${f}')">${item.people.includes(f) ? '✓ ' : ''}${this.escHtml(f)}</button>`).join('')}
        </div>
      </div>
    `).join('');
      },
      renderSummary() {
        const card = document.getElementById('summaryCard');
        if (AppState.friends.length === 0 && AppState.items.length === 0) { card.style.display = 'none'; return; }
        card.style.display = 'block';
        const { totals, breakdown, grandTotal } = AppState.calcSummary();
        let html = `<thead><tr><th>ชื่อ</th><th style="text-align:right">ยอดรวม</th></tr></thead><tbody>`;
        AppState.friends.forEach(f => {
          const isOpen = AppState.openBreakdowns.has(f);
          html += `<tr class="summary-row" onclick="UI.toggleBreakdown('${f}')">
          <td><div class="person-name-cell"><span class="expand-icon ${isOpen ? 'open' : ''}">▶</span>${this.escHtml(f)}</div></td>
          <td class="amount-cell">${this.formatCurrencyText(totals[f])}</td>
        </tr>
        <tr class="breakdown-row"><td colspan="2"><div class="breakdown-content ${isOpen ? 'open' : ''}"><div class="breakdown-inner">
          ${breakdown[f].map(b => `<div class="breakdown-item"><span>${this.escHtml(b.name)} (÷${b.total}คน)</span><span class="breakdown-item-price">${this.formatCurrencyText(b.share)}</span></div>`).join('')}
        </div></div></td></tr>`;
        });
        html += `<tr class="total-row"><td style="font-weight:700">รวมทั้งหมด</td><td style="font-weight:700;color:var(--accent3);text-align:right">${this.formatCurrencyText(grandTotal)}</td></tr></tbody>`;
        document.getElementById('summaryTable').innerHTML = html;
      },
      toggleBreakdown(name) {
        if (AppState.openBreakdowns.has(name)) AppState.openBreakdowns.delete(name);
        else AppState.openBreakdowns.add(name);
        this.renderSummary();
      }
    };

    const Actions = {
      getValidationAndPayment() {
        const errors = []; const { totals, grandTotal } = AppState.calcSummary();
        if (AppState.friends.length === 0) errors.push({ icon: '👥', text: 'เพิ่มเพื่อนก่อนนะ' });
        if (grandTotal === 0) errors.push({ icon: '🧾', text: 'เลือกคนหารในรายการ' });
        const type = document.getElementById('bankType').value; const acctNo = document.getElementById('accountNumber').value.trim();
        let paymentInfo = null;
        if (type) {
          const bName = document.getElementById('bankName').value; const aName = (type === 'bank') ? document.getElementById('accountName').value.trim() : document.getElementById('promptpayName').value.trim();
          if (!acctNo) errors.push({ icon: '🔢', text: 'กรอกเลขบัญชี' });
          if (!aName) errors.push({ icon: '👤', text: 'กรอกชื่อบัญชี' });
          paymentInfo = { type, label: (type === 'promptpay' ? 'พร้อมเพย์' : (bName === 'other' ? document.getElementById('bankOtherName').value : bName)), number: acctNo, name: aName };
        }
        return { errors, totals, grandTotal, paymentInfo };
      },
      shareText() {
        const { errors, totals, paymentInfo } = this.getValidationAndPayment();
        if (errors.length) { UI.showDialog(errors); return; }
        let lines = ['💸 สรุปยอดหารตัง', ''];
        AppState.friends.forEach(f => lines.push(`👤 ${f}  →  ${UI.formatCurrencyText(totals[f])}`));
        if (paymentInfo) lines.push('', '── ช่องทางรับโอน ──', `${paymentInfo.label}: ${paymentInfo.number}`, `ชื่อ: ${paymentInfo.name}`);
        const text = lines.join('\n');
        if (navigator.share) navigator.share({ text }).catch(() => { });
        else { navigator.clipboard.writeText(text).then(() => UI.showToast('📋 คัดลอกแล้ว')); }
      },
      async shareImage() {
        const { errors, paymentInfo } = this.getValidationAndPayment();
        if (errors.length) { UI.showDialog(errors); return; }
        UI.showToast('⏳ กำลังเตรียมรูปภาพ...');
        const area = document.getElementById('captureArea');
        const payDisp = document.getElementById('paymentDisplay');

        // Set current date/time
        document.getElementById('captureDate').textContent = new Date().toLocaleString('th-TH', {
          year: 'numeric', month: 'long', day: 'numeric',
          hour: '2-digit', minute: '2-digit'
        });

        if (paymentInfo) {
          document.getElementById('payDisplayLabel').textContent = paymentInfo.label;
          document.getElementById('payDisplayNumber').textContent = paymentInfo.number;
          document.getElementById('payDisplayName').textContent = paymentInfo.name;
          payDisp.style.display = 'block';
        } else { payDisp.style.display = 'none'; }
        try {
          await document.fonts.ready;
          area.classList.add('capture-mode');
          const canvas = await html2canvas(area, { backgroundColor: '#0d1117', scale: 3, logging: false, useCORS: true });
          area.classList.remove('capture-mode');
          payDisp.style.display = 'none';
          const dataUrl = canvas.toDataURL('image/png', 1.0);
          if (navigator.share && navigator.canShare && navigator.canShare({ files: [new File([], "bill.png", { type: "image/png" })] })) {
            const blob = await (await fetch(dataUrl)).blob();
            const file = new File([blob], "harn-tang-bill.png", { type: "image/png" });
            await navigator.share({ files: [file], title: 'สรุปยอดหารตัง' }).catch(() => UI.showPreview(dataUrl));
          } else { UI.showPreview(dataUrl); }
        } catch (e) { UI.showToast('❌ ไม่สามารถสร้างรูปภาพได้'); console.error(e); }
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('friendInput').addEventListener('input', e => { document.getElementById('addFriendBtn').disabled = !e.target.value.trim(); });
    });
  </script>
</body>

</html>
